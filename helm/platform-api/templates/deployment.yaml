apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  labels:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/part-of: keycloak-vault-pki-platform-lab
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-api
        app.kubernetes.io/part-of: keycloak-vault-pki-platform-lab
    spec:
      containers:
        - name: platform-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: KEYCLOAK_REALM
              value: "{{ .Values.env.KEYCLOAK_REALM }}"
            - name: KEYCLOAK_ISSUER
              value: "{{ .Values.env.KEYCLOAK_ISSUER }}"
            - name: KEYCLOAK_INTERNAL_JWKS_URL
              value: "{{ .Values.env.KEYCLOAK_INTERNAL_JWKS_URL }}"
            - name: KEYCLOAK_AUDIENCE
              value: "{{ .Values.env.KEYCLOAK_AUDIENCE }}"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
